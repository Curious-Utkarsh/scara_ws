moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - arm_controller
    - gripper_controller

  arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory #vimp line, not given by moveit_setup_assistant
    default: true
    joints:
      - column_joint
      - shoulder_joint
      - forearm_joint
      - wrist_joint

  gripper_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory #vimp line, not given by moveit_setup_assistant
    default: true
    joints:
      - left_finger_joint