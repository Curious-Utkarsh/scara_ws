controller_manager:
  ros__parameters:
    update_rate: 100 # Hz
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - column_joint
      - shoulder_joint
      - forearm_joint
      - wrist_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    open_loop_control: true
    allow_integration_in_goal_trajectories: true

gripper_controller:
  ros__parameters:
    joints:
      - left_finger_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    open_loop_control: true
    allow_integration_in_goal_trajectories: true

# Publish only joints that are variables in the MoveIt robot model.  The
# right_finger_joint_mimic dummy is fixed and must not be sent in /joint_states.
joint_state_broadcaster:
  ros__parameters:
    joints:
      - column_joint
      - shoulder_joint
      - forearm_joint
      - wrist_joint
      - left_finger_joint
    interfaces:
      - position
      - velocity
